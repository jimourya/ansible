      #    remote_user: dhananjay
    ansible_sudo_pass: "Dhanuki@1234"
    wildfly_install_dir: /opt/wildfly/
    wildfly_home: /opt/wildfly/wildfly-{{ wildfly_version }}
    wildfly_symlink: /opt/wildfly/current
    wildfly_service_name: wildfly
    wildfly_archive_url: https://github.com/wildfly/wildfly/releases/download/{{
      wildfly_version }}/wildfly-{{ wildfly_version }}.tar.gz
    wildfly_checksum: sha256:{{ lookup('ansible.builtin.url',
