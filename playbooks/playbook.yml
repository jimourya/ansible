    - name: Create stable symlink
      file:
        src: "{{ wildfly_home }}"
        dest: "{{ wildfly_symlink }}"
        state: link
        force: true
        mode: "0755"  

    - name: Create WildFly config dirs
      file:
        path: "{{ wildfly_symlink }}/{{ item }}"
        state: directory
        owner: "{{ wildfly_user }}"
        group: "{{ wildfly_group }}"
        mode: "0755"
      loop:
        - standalone
        - standalone/configuration
        - logs

    - name: Install systemd unit
      copy:
        dest: /etc/systemd/system/{{ wildfly_service_name }}.service
        content: |
          [Unit]
          Description=WildFly Application Server
          After=network.target

          [Service]
          Type=simple
          User={{ wildfly_user }}
          Group={{ wildfly_group }}
          ExecStart={{ wildfly_symlink }}/bin/standalone.sh -b {{ wildfly_bind_address }} -bmanagement {{ wildfly_bind_address }} -Djboss.http.port={{ wildfly_http_port }} -Djboss.management.http.port={{ wildfly_mgmt_port }}
          ExecStop=/bin/kill -TERM $MAINPID
          Environment=JBOSS_HOME={{ wildfly_symlink }}
          Restart=on-failure
          LimitNOFILE=65535
          TimeoutStartSec=60
          TimeoutStopSec=60

          [Install]
          WantedBy=multi-user.target
      notify:
        - systemd daemon-reload
        - restart wildfly

          #    - name: Open firewall ports (RHEL-family)
          #      firewalld:
          #        port: "{{ item }}/tcp"
          #        permanent: true
