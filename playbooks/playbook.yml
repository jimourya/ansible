    - name: Create application group
      group:
        name: "{{ wildfly_group }}"
        system: true

    - name: Create application user
      user:
        name: "{{ wildfly_user }}"
        group: "{{ wildfly_group }}"
        system: true
          #        remote_src: true  
        shell: /sbin/nologin
        create_home: false

    - name: Create install dir
      file:
        path: "{{ wildfly_install_dir }}"
        state: directory
    - name: Download WildFly archive
      get_url:
        url: "{{ wildfly_archive_url }}"
        dest: "/tmp/wildfly-{{ wildfly_version }}.tar.gz"
        mode: "0755"
          ###        checksum: "{{ (wildfly_checksum | length) > 0 | ternary(wildfly_checksum, omit) }}"

    - name: Extract WildFly
      unarchive:
        src: "/tmp/wildfly-{{ wildfly_version }}.tar.gz"
        dest: "{{ wildfly_install_dir }}"
        remote_src: true
        creates: "{{ wildfly_home }}"
        mode: "0755"
