      wildfly_version }}/wildfly-{{ wildfly_version }}.tar.gz.sha256',
      split_lines=False, errors='ignore') | default('', true) }}
    wildfly_bind_address: 20.51.169.27
    wildfly_http_port: 8080
    wildfly_https_port: 8443
    wildfly_mgmt_port: 9990
    open_firewall: true
    configure_selinux: true
    create_mgmt_user: true
    mgmt_username: "admin" 
    mgmt_passwd: "ChangeMe!123"
    mgmt_password: "ChangeMe!123"
  become: yes    
  pre_tasks:
    - name: Install iproute2 package
      package:
        name: "{{ (ansible_facts['distribution_major_version'] | int < 8) | ternary('iproute', 'iproute2') }}"
        state: present

    - name: Ensure required packages are installed (RHEL/Debian families)
      package:
        name: "{{ item }}"
        state: present
      loop: >-
        {{
          (ansible_os_family == 'RedHat') |
          ternary(['java-11-openjdk-headless','tar','unzip','gzip','policycoreutils-python-utils'],
                  ['openjdk-17-jre-headless','tar','unzip','gzip','policycoreutils-python-utils'])
        }}
      ignore_errors: true
    - name: Ensure firewalld installed on RHEL-family when requested
      package:
        name: firewalld
        state: present
      when: open_firewall and ansible_os_family == 'RedHat'
    - name: Start and enable firewalld
      service:
        name: firewalld
        state: started
        enabled: true
      when: open_firewall and ansible_os_family == 'RedHat'
