          #        - "{{ wildfly_mgmt_port }}"
          #        - "{{ wildfly_https_port }}"
          #      when: open_firewall and ansible_os_family == 'Debian'

          #    - name: Configure SELinux port contexts (RHEL-family)
          #      sefcontext:
          #        target: "tcp:{{ item }}"
          #        setype: http_port_t
          #        state: present
          #      loop:
          #        - "{{ wildfly_http_port }}"
          #        - "{{ wildfly_mgmt_port }}"
          #        - "{{ wildfly_https_port }}"
          #      when: configure_selinux and ansible_os_family == 'ubuntu'
          #      ignore_errors: true

    - name: Apply SELinux contexts
      command: "semanage port -a -t http_port_t -p tcp {{ item }}"
      register: semanage_result
      changed_when: semanage_result.rc == 0
      failed_when: false
      loop:
        - "{{ wildfly_http_port }}"
        - "{{ wildfly_mgmt_port }}"
        - "{{ wildfly_https_port }}"
      when: configure_selinux and ansible_os_family == 'RedHat'

    - name: Enable and start service
      service:
        name: "{{ wildfly_service_name }}"
        enabled: true
        state: started

    - name: Create management user (if requested)
      command: >
        {{ wildfly_symlink }}/bin/add-user.sh
        -u {{ mgmt_username }}
        -p {{ mgmt_password }}
        -g "admin"
        -s "ChangeMe!123"
      args:
        creates: "{{ wildfly_symlink }}/standalone/configuration/mgmt-users.properties"
      when: create_mgmt_user
      notify: restart wildfly

  handlers:
    - name: systemd daemon-reload
      systemd:
        daemon_reload: true

    - name: restart wildfly
      service:
        name: "{{ wildfly_service_name }}"
        state: restarted

    - name: fix perms
      file:
        path: "{{ wildfly_symlink }}"
        owner: "{{ wildfly_user }}"
        group: "{{ wildfly_group }}"
        recurse: true

          
